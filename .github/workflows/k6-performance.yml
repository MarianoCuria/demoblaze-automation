name: k6 Performance Tests
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which scenario to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
  schedule:
    # Weekly smoke check — cheap, catches API contract/latency regressions
    # without running heavy load against a third-party demo instance on every push.
    - cron: '0 9 * * 1'

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 smoke scenario
        if: ${{ github.event_name == 'schedule' || inputs.scenario == 'smoke' }}
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance/scenarios/smoke.js

      - name: Run k6 load scenario
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'load' }}
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance/scenarios/browse-load.js
