name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests 
      run: npx playwright test 
      env:
        DEMOBLAZE_USERNAME: ${{ secrets.DEMOBLAZE_USERNAME }}
        DEMOBLAZE_PASSWORD: ${{ secrets.DEMOBLAZE_PASSWORD }}
        # Datos ficticios Place Order (alineado con .env.example); Demoblaze no valida tarjeta real.
        CHECKOUT_NAME: CI User
        CHECKOUT_COUNTRY: Argentina
        CHECKOUT_CITY: Buenos Aires
        CHECKOUT_CARD: '4242424242424242'
        CHECKOUT_MONTH: '12'
        CHECKOUT_YEAR: '2026'
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
